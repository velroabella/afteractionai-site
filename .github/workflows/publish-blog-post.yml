name: Publish Blog Post

# Runs every 48 hours (at 08:00 UTC on odd days)
# Can also be triggered manually from GitHub Actions tab
on:
  schedule:
    - cron: '0 8 */2 * *'  # Every 2 days at 8am UTC
  workflow_dispatch:         # Manual trigger button

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check queue status
        id: check_queue
        run: |
          QUEUE_COUNT=$(node -e "const q=JSON.parse(require('fs').readFileSync('data/blog-queue.json','utf8')); console.log(q.length)")
          echo "queue_count=$QUEUE_COUNT" >> $GITHUB_OUTPUT
          if [ "$QUEUE_COUNT" -eq "0" ]; then
            echo "Blog queue is empty. Skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Queue has $QUEUE_COUNT posts remaining."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish next post
        if: steps.check_queue.outputs.skip != 'true'
        id: publish
        run: |
          node scripts/publish-next-post.js
          echo "published=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.publish.outputs.published == 'true'
        run: |
          git config user.name "AfterAction Blog Bot"
          git config user.email "blog-bot@afteractionai.org"
          git add data/blog-posts.json data/blog-queue.json images/blog/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          TITLE=$(node -e "const p=JSON.parse(require('fs').readFileSync('data/blog-posts.json','utf8')); console.log(p[p.length-1].title)")
          git commit -m "blog: publish \"${TITLE}\"

          Automated 48-hour blog publish via GitHub Actions."
          git push

      - name: Queue warning
        if: steps.check_queue.outputs.queue_count != '' && steps.check_queue.outputs.queue_count < 5
        run: |
          echo "::warning::Blog queue is running low! Only ${{ steps.check_queue.outputs.queue_count }} posts remaining. Refill data/blog-queue.json soon."
